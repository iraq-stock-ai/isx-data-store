name: أرشفة تاريخية - تداول غير العراقيين

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: foreign-trading-archive
  cancel-in-progress: false

jobs:
  archive-foreign-trading:
    runs-on: ubuntu-latest
    timeout-minutes: 30          # ⬅️ زدنا المهلة إلى 30 دقيقة
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install requests beautifulsoup4 openpyxl lxml

      - name: تشغيل سكريبت الأرشفة
        run: python isx_foreign_archive.py

      - name: فحص وجود تغييرات
        id: check_changes
        if: always()
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ورفع التحديثات
        if: always() && steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_foreign_trading.json archive_progress.json   # ⬅️ نضيف ملف التقدم
          git commit -m "تحديث أرشيف التداول الأجنبي - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push

      - name: تنبيه عند الفشل
        if: failure()
        run: |
          echo "❌ فشلت التشغيلة، لكن السكربتات الأخرى مستقلة ولن تتأثر."
