name: تحديث يومي - تداول غير العراقيين

# isx_foreign_archive.py أُعيد بناؤه بنفس بنية وأسلوب isx_daily_update.py
# بالضبط (بوابات تحقق مرقّمة، argparse، بلا أي ملف تقدّم/last_page).
# كل تشغيلة تجلب "أحدث تقرير منشور فعلياً" من جديد، تماماً كأبو الأسعار،
# فهي تعمل بشكل صحيح تماماً عند عدة محاولات بنفس اليوم (2، 4، 6، 8 مساءً):
# منع التكرار يتم عبر مقارنة (date + direction) بملف الإخراج نفسه، فلا
# حاجة لأي حالة (state) خارجية بين التشغيلات.

on:
  schedule:
    # 4 محاولات، الأحد-الخميس فقط (أيام تداول ISX)، بنفس منطق جدولة
    # الأسعار الأساسية: تبدأ بعد الظهر (وقت النشر المعتاد للتقرير)
    # وتتكرر على فترات متباعدة كاحتياط لتأخر النشر.
    - cron: '0 11 * * 0-4'   # 2:00 عصراً بغداد (UTC+3)
    - cron: '0 13 * * 0-4'   # 4:00 عصراً بغداد — احتياط أول
    - cron: '0 15 * * 0-4'   # 6:00 مساءً بغداد — احتياط ثانٍ
    - cron: '0 17 * * 0-4'   # 8:00 مساءً بغداد — احتياط ثالث

  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: foreign-trading-daily
  cancel-in-progress: false

jobs:
  update-foreign-trading-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # محاولة يوم واحد فقط (لا أرشفة)، وقت أقصر بكثير كافٍ
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install requests beautifulsoup4 openpyxl lxml

      - name: تشغيل سكريبت التحديث (نفس بنية أبو الأسعار بالضبط)
        run: python isx_foreign_archive.py --existing isx_foreign_trading.json --output isx_foreign_trading.json

      - name: فحص وجود تغييرات فعلية
        id: check_changes
        if: always()
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ورفع تحديثات اليوم (فقط إن وُجدت سجلات جديدة فعلاً)
        if: always() && steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_foreign_trading.json
          git commit -m "تحديث يومي (تداول غير العراقيين) - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push

      - name: تنبيه عند عدم نشر التقرير بعد (طبيعي، ليس خطأً — ستُعاد المحاولة)
        if: failure()
        run: |
          echo "⚠️ لم يُعثر على تقرير جديد بهذه المحاولة — على الأغلب لم يُنشر بعد."
          echo "   هذا متوقَّع وطبيعي؛ سيُعاد المحاولة تلقائياً بالموعد التالي بنفس اليوم."
          echo "   سكربت الأسعار الأساسي وباقي السكربتات مستقلة تماماً ولن تتأثر."
