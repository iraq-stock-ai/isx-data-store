name: تحديث بيانات ISX (أسعار + إفصاحات + أخبار)

on:
  schedule:
    # ===== جدولة الأسعار: 4 محاولات، الأحد-الخميس فقط (أيام تداول ISX) =====
    # كل محاولة تشغّل نفس السكريبت المحمي ببوابات تحقق؛ لو الملف اليومي
    # من ISX لم يُنشر بعد، بوابة "تاريخ حديث" أو "عدد أسهم معقول" ترفضه
    # بأمان دون أي commit خاطئ. أول محاولة تنجح فعلياً هي التي تُحدِّث الملف.
    - cron: '0 11 * * 0-4'   # 2:00 عصراً بغداد (UTC+3) — بعد الإغلاق بساعة
    - cron: '0 13 * * 0-4'   # 4:00 عصراً بغداد — احتياط أول
    - cron: '0 17 * * 0-4'   # 8:00 مساءً بغداد — احتياط ثانٍ + هذا التوقيت يُشغِّل الإفصاحات وGemini أيضاً
    - cron: '0 6 * * 0-4'    # 9:00 صباحاً بغداد اليوم التالي — يلتقط تقارير متأخرة
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # ============================================================
  # Job 1: تحديث الأسعار — يعمل بكل المحاولات الأربع أعلاه
  # ============================================================
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 openpyxl

      - name: تشغيل سكريبت الأسعار (مع بوابات التحقق الست)
        run: python isx_daily_update.py --existing isx_history_all.json --output isx_history_all.json

      - name: فحص وجود تغييرات فعلية
        id: check_changes
        run: |
          if git diff --quiet isx_history_all.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ورفع تحديث الأسعار
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_history_all.json
          git commit -m "تحديث أسعار ISX اليومي - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push

      - name: تنبيه عند الفشل
        if: failure()
        run: |
          echo "❌ فشلت محاولة تحديث الأسعار بهذا التوقيت — طبيعي إذا لم يُنشر التقرير اليومي بعد."
          echo "سيُعاد المحاولة تلقائياً بالتوقيت التالي المجدول. لا حاجة لتدخل عاجل."

  # ============================================================
  # Job 2: الإفصاحات الرسمية من isc.gov.iq — بدون Gemini
  # يعمل فقط بمحاولة الساعة 8 مساءً (مرة واحدة باليوم كافية)
  # ============================================================
  update-disclosures:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 17 * * 0-4' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4

      - name: تشغيل سكريبت الإفصاحات (isc.gov.iq مباشرة)
        run: python news-pipeline/isc_disclosures_fetcher.py --existing isx_news.json --output isx_news.json

      - name: فحص وجود تغييرات فعلية
        id: check_changes
        run: |
          if git diff --quiet isx_news.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ورفع الإفصاحات الجديدة
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_news.json
          git commit -m "تحديث الإفصاحات الرسمية - $(date -u +'%Y-%m-%d')"
          git pull --rebase
          git push

  # ============================================================
  # Job 3: الأخبار العامة وإشارات التواصل الاجتماعي — عبر Gemini
  # مرة واحدة فقط باليوم (نفس توقيت الإفصاحات، 8 مساءً)
  # ============================================================
  update-gemini-news:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 17 * * 0-4' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: تشغيل سكريبت Gemini (مع بوابات التحقق الخمس)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news-pipeline/gemini_news_fetcher.py --existing isx_news.json --output isx_news.json

      - name: فحص وجود تغييرات فعلية
        id: check_changes
        run: |
          if git diff --quiet isx_news.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ورفع الأخبار الجديدة
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_news.json
          git commit -m "تحديث الأخبار العامة والتواصل الاجتماعي - $(date -u +'%Y-%m-%d')"
          git pull --rebase
          git push

      - name: تنبيه عند الفشل
        if: failure()
        run: |
          echo "❌ فشلت بوابة تحقق بسكريبت Gemini — راجع السجل أعلاه."
          echo "الملف isx_news.json لم يتغيّر. سيُعاد المحاولة غداً بنفس التوقيت."
