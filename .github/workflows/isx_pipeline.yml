name: تحديث بيانات ISX (أسعار + إفصاحات + أخبار)

on:
  schedule:
    - cron: '0 11 * * 0-4'
    - cron: '0 13 * * 0-4'
    - cron: '0 17 * * 0-4'
    - cron: '0 6 * * 0-4'
    - cron: '5 11 * * 0-4'
    - cron: '45 11 * * 0-4'
    - cron: '25 12 * * 0-4'
    - cron: '5 13 * * 0-4'
    - cron: '45 13 * * 0-4'
    - cron: '25 14 * * 0-4'
    - cron: '5 15 * * 0-4'
    - cron: '45 15 * * 0-4'
    - cron: '25 16 * * 0-4'
    - cron: '5 17 * * 0-4'
    - cron: '45 17 * * 0-4'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-prices-and-legacy-disclosures:
    if: |
      github.event.schedule == '0 11 * * 0-4' ||
      github.event.schedule == '0 13 * * 0-4' ||
      github.event.schedule == '0 17 * * 0-4' ||
      github.event.schedule == '0 6 * * 0-4' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # تم فرض إعادة التثبيت بدون استخدام Cache القديم
      - name: تثبيت المكتبات (تثبيت إجباري)
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir --force-reinstall google-generativeai requests beautifulsoup4 openpyxl lxml pdfplumber

      - name: تشغيل سكريبت الأسعار
        run: python isx_daily_update.py --existing isx_history_all.json --output isx_history_all.json

      - name: تشغيل سكريبت الأخبار الخارجية
        if: github.event.schedule == '0 17 * * 0-4' || github.event_name == 'workflow_dispatch'
        run: python news-pipeline/gemini_news_fetcher.py

      - name: فحص وجود تغييرات فعلية
        id: check_changes
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ورفع التحديثات
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_history_all.json isx_news.json
          git commit -m "تحديث تلقائي - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  process-single-disclosure-and-news-via-gemini:
    if: |
      github.event.schedule == '5 11 * * 0-4' ||
      github.event.schedule == '45 11 * * 0-4' ||
      github.event.schedule == '25 12 * * 0-4' ||
      github.event.schedule == '5 13 * * 0-4' ||
      github.event.schedule == '45 13 * * 0-4' ||
      github.event.schedule == '25 14 * * 0-4' ||
      github.event.schedule == '5 15 * * 0-4' ||
      github.event.schedule == '45 15 * * 0-4' ||
      github.event.schedule == '25 16 * * 0-4' ||
      github.event.schedule == '5 17 * * 0-4' ||
      github.event.schedule == '45 17 * * 0-4' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # تم فرض إعادة التثبيت بدون استخدام Cache القديم هنا أيضاً
      - name: تثبيت المكتبات (تثبيت إجباري)
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir --force-reinstall google-generativeai requests beautifulsoup4 lxml pdfplumber

      - name: تلخيص إفصاح جديد
        env:
          GEMINI_DISCLOSURES_API_KEY: ${{ secrets.GEMINI_DISCLOSURES_API_KEY }}
        run: python news-pipeline/gemini_disclosures_summarizer.py --existing isx_disclosures.json --output isx_disclosures.json

      - name: تلخيص خبر سوق جديد
        env:
          GEMINI_MARKET_NEWS_API_KEY: ${{ secrets.GEMINI_MARKET_NEWS_API_KEY }}
        run: python news-pipeline/gemini_market_news_summarizer.py --existing isx_market_news.json --output isx_market_news.json

      - name: Commit ورفع التحديثات
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_disclosures.json isx_market_news.json
          git commit -m "تحديث Gemini - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
