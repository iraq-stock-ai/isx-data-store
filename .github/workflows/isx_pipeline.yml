name: تحديث بيانات ISX (أسعار + إفصاحات + أخبار)

on:
  schedule:
    - cron: '0 11 * * 0-4'
    - cron: '0 13 * * 0-4'
    - cron: '0 17 * * 0-4'
    - cron: '0 6 * * 0-4'
    - cron: '5 11 * * 0-4'
    - cron: '45 11 * * 0-4'
    - cron: '25 12 * * 0-4'
    - cron: '5 13 * * 0-4'
    - cron: '45 13 * * 0-4'
    - cron: '25 14 * * 0-4'
    - cron: '5 15 * * 0-4'
    - cron: '45 15 * * 0-4'
    - cron: '25 16 * * 0-4'
    - cron: '5 17 * * 0-4'
    - cron: '45 17 * * 0-4'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: تثبيت المكتبات الأساسية
        run: pip install requests beautifulsoup4 openpyxl lxml pdfplumber
      - name: تشغيل سكريبت الأسعار
        run: python isx_daily_update.py --existing isx_history_all.json --output isx_history_all.json
      - name: Commit ورفع الأسعار
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "تحديث الأسعار - $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push

  process-ai-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: تثبيت المكتبات الأساسية
        run: pip install requests beautifulsoup4 lxml pdfplumber
      - name: تشغيل سكريبت الذكاء الاصطناعي
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_DISCLOSURES_API_KEY }}
        run: |
          python news-pipeline/gemini_disclosures_summarizer.py
          python news-pipeline/gemini_market_news_summarizer.py
      - name: Commit ورفع البيانات
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "تحديث AI - $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push
