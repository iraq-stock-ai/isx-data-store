name: تحديث بيانات ISX (أسعار + إفصاحات + أخبار)

on:
  schedule:
    # ===== جدولة الأسعار: 4 محاولات، الأحد-الخميس فقط (أيام تداول ISX) =====
    - cron: '0 11 * * 0-4'   # 2:00 عصراً بغداد (UTC+3) — بعد الإغلاق بساعة
    - cron: '0 13 * * 0-4'   # 4:00 عصراً بغداد — احتياط أول
    - cron: '0 17 * * 0-4'   # 8:00 مساءً بغداد — احتياط ثانٍ + تشغيل الإفصاحات وGemini
    - cron: '0 6 * * 0-4'    # 9:00 صباحاً بغداد اليوم التالي — يلتقط تقارير متأخرة
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-all-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # تثبيت كل المكتبات المطلوبة في حاسبة واحدة
      - name: تثبيت المكتبات
        run: pip install requests beautifulsoup4 openpyxl

      # [1] تشغيل سكريبت الأسعار (يعمل في كل المحاولات الأربع)
      - name: تشغيل سكريبت الأسعار
        run: python isx_daily_update.py --existing isx_history_all.json --output isx_history_all.json

      # [2] تشغيل سكريبت الإفصاحات (يعمل فقط الساعة 8 مساءً أو عند التشغيل اليدوي)
      - name: تشغيل سكريبت الإفصاحات
        if: github.event.schedule == '0 17 * * 0-4' || github.event_name == 'workflow_dispatch'
        run: python news-pipeline/isc_disclosures_fetcher.py --existing isx_news.json --output isx_news.json

      # [3] تشغيل سكريبت Gemini للأخبار (يعمل فقط الساعة 8 مساءً أو عند التشغيل اليدوي)
      - name: تشغيل سكريبت Gemini
        if: github.event.schedule == '0 17 * * 0-4' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news-pipeline/gemini_news_fetcher.py --existing isx_news.json --output isx_news.json

      # [4] فحص ذكي يشمل الملفات المعدلة والملفات الجديدة تماماً (isx_news.json)
      - name: فحص وجود تغييرات فعلية
        id: check_changes
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # [5] رفع كل الملفات الناتجة دفعة واحدة وبأمان تام
      - name: Commit ورفع جميع التحديثات
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "isx-data-bot"
          git config user.email "actions@github.com"
          git add isx_history_all.json isx_news.json
          git commit -m "تحديث تلقائي شامل لبيانات ISX - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push

      - name: تنبيه عند الفشل
        if: failure()
        run: |
          echo "❌ حدث خطأ في إحدى خطوات المعالجة، يرجى مراجعة السجل أعلاه."
